<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
           background-color: rgb(124, 216, 117);
                height: 100vh;
                display: flex;
                justify-content: space-between;

                align-items:flex-end;
        }
        .item1, .item2, .item3 {
            height: 140px; 
            width: 160px;
            background-color: rgb(79, 153, 177);
            border: 1px solid rgb(62, 222, 201);
        }
        
    </style>
</head>
<body>
    <h1>Flexbox Example</h1>
   <div class="container">
    <div class="item1">Item 1</div>
    <div class="item2">Item 2</div>
    <div class="item3">Item 3</div>  
</body>
</html>
