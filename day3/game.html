<html>
    <head>

    </head>
    <body>
        <h1>Rock Paper Scissors Game</h1>
        <button onclick="play('rock')">🪨</button>
        <button onclick="play('paper')">📄</button>
        <button onclick="play('scissors')">✂️</button>
        <h3 id="result"></h3>
        <h3 id="score"></h3>
        <script>
            let computerScore = 0;
            function play(userChoice){
                const choices = ['rock', 'paper', 'scissors'];
                let computerChoice = choices[Math.floor(Math.random() * 3)];
                let resultText = '';
                if(userChoice === computerChoice){
                    resultText = "Its a draw!";
                } else if((userChoice === 'rock' && computerChoice === 'scissors') ||
                          (userChoice === 'paper' && computerChoice === 'rock') ||
                          (userChoice === 'scissors' && computerChoice === 'paper')){
                    resultText = "You win!";
                    computerScore++;
                } else {
                    resultText = "Computer wins!";
                }
                document.getElementById('result').innerText = `You chose ${userChoice}, Computer chose ${computerChoice}. ${resultText}`;
                document.getElementById('score').innerText = `Computer Score: ${computerScore}`;                    
            }

        </script>
    </body>
</html>
